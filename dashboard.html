<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Asistente Pedagógico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-gray-50">
    
    <!-- Layout principal -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <!-- Header del sidebar -->
            <div class="p-4 border-b">
                <div class="flex items-center">
                    <i class="fas fa-graduation-cap text-2xl text-blue-600"></i>
                    <span class="ml-2 font-bold text-lg">Asistente IA</span>
                </div>
            </div>
            
            <!-- Lista de grupos -->
            <div class="flex-1 overflow-y-auto p-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-gray-700">Mis Grupos</h3>
                    <button onclick="window.location.href='grupos.html?action=nuevo'" class="text-blue-600 hover:text-blue-700">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <!-- Grupos dinámicos -->
                <div id="grupos-list" class="space-y-2">
                    <!-- Se llenan dinámicamente -->
                    <div class="text-center text-gray-500 py-8">
                        <i class="fas fa-spinner fa-spin text-2xl"></i>
                        <p class="mt-2">Cargando grupos...</p>
                    </div>
                </div>
            </div>
            
            <!-- Footer del sidebar -->
            <div class="p-4 border-t space-y-2">
                <!-- Uso de plan -->
                <div id="plan-usage" class="bg-blue-50 p-3 rounded-lg text-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span id="plan-label" class="font-semibold text-blue-900">Plan Free</span>
                        <a id="upgrade-link" href="cuenta.html" class="text-blue-600 text-xs hover:underline">Upgrade</a>
                    </div>
                    <div class="text-blue-700">
                        <i class="fas fa-comments mr-1"></i>
                        <span id="messages-used">0</span>/<span id="messages-limit">10</span> mensajes
                    </div>
                    <div class="mt-2 bg-blue-200 rounded-full h-2">
                        <div id="usage-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                
                <!-- Botones de acción -->
                <button onclick="window.location.href='grupos.html'" class="w-full bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 flex items-center justify-center">
                    <i class="fas fa-users mr-2"></i>
                    Gestionar Grupos
                </button>
            </div>
        </aside>
        
        <!-- CONTENIDO PRINCIPAL -->
        <div class="flex-1 flex flex-col">
            
            <!-- Header -->
            <header class="bg-white border-b px-6 py-4">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
                        <p class="text-gray-600">Bienvenido de nuevo, <span id="user-name">Docente</span></p>
                    </div>
                    
                    <!-- Usuario dropdown -->
                    <div class="relative">
                        <button id="user-menu-btn" class="flex items-center space-x-2 hover:bg-gray-100 px-3 py-2 rounded-lg">
                            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                                <span id="user-initial">D</span>
                            </div>
                            <i class="fas fa-chevron-down text-gray-600"></i>
                        </button>
                        
                        <!-- Dropdown menu -->
                        <div id="user-menu" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg border py-2">
                            <div class="px-4 py-2 border-b">
                                <p class="text-sm font-semibold text-gray-900 truncate" id="user-name-menu">Docente</p>
                                <p class="text-xs text-gray-500 truncate" id="user-email"></p>
                            </div>
                            <a href="cuenta.html#perfil" onclick="sessionStorage.setItem('cuenta_tab','perfil')" class="flex items-center px-4 py-2 hover:bg-gray-100 text-sm">
                                <i class="fas fa-user mr-2 text-gray-500 w-4"></i>
                                Mi Perfil
                            </a>
                            <a href="cuenta.html#suscripcion" onclick="sessionStorage.setItem('cuenta_tab','suscripcion')" class="flex items-center px-4 py-2 hover:bg-gray-100 text-sm">
                                <i class="fas fa-credit-card mr-2 text-gray-500 w-4"></i>
                                Suscripción
                            </a>
                            <a href="cuenta.html#seguridad" onclick="sessionStorage.setItem('cuenta_tab','seguridad')" class="flex items-center px-4 py-2 hover:bg-gray-100 text-sm">
                                <i class="fas fa-lock mr-2 text-gray-500 w-4"></i>
                                Seguridad
                            </a>
                            <hr class="my-1">
                            <button onclick="logout()" class="w-full flex items-center px-4 py-2 hover:bg-gray-100 text-sm text-red-600">
                                <i class="fas fa-sign-out-alt mr-2 w-4"></i>
                                Cerrar Sesión
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Área de contenido -->
            <main class="flex-1 overflow-y-auto p-6">
                
                <!-- Resumen rápido -->
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <!-- Card 1 -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-gray-600 text-sm font-medium">Total Grupos</h3>
                            <i class="fas fa-users text-blue-600 text-2xl"></i>
                        </div>
                        <p class="text-3xl font-bold text-gray-900" id="total-grupos">0</p>
                    </div>
                    
                    <!-- Card 2 -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-gray-600 text-sm font-medium">Estudiantes</h3>
                            <i class="fas fa-user-graduate text-green-600 text-2xl"></i>
                        </div>
                        <p class="text-3xl font-bold text-gray-900" id="total-estudiantes">0</p>
                    </div>
                    
                    <!-- Card 3 -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-gray-600 text-sm font-medium">Mensajes este mes</h3>
                            <i class="fas fa-comments text-purple-600 text-2xl"></i>
                        </div>
                        <p class="text-3xl font-bold text-gray-900">
                            <span id="mensajes-usados">0</span>/<span id="mensajes-limite">10</span>
                        </p>
                    </div>
                </div>
                
                <!-- Acciones rápidas -->
                <div class="mb-8">
                    <h2 class="text-xl font-bold text-gray-900 mb-4">Acciones Rápidas</h2>

                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        <button onclick="window.location.href='grupos.html?action=nuevo'"
                            class="bg-white p-5 rounded-lg shadow hover:shadow-md transition-shadow text-left group">
                            <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center mb-3 group-hover:bg-blue-600 transition-colors">
                                <i class="fas fa-plus text-blue-600 group-hover:text-white transition-colors"></i>
                            </div>
                            <h3 class="font-semibold mb-1">Crear Nuevo Grupo</h3>
                            <p class="text-gray-500 text-sm">Agrega un grupo de estudiantes</p>
                        </button>

                        <button onclick="openFirstGroup()"
                            class="bg-white p-5 rounded-lg shadow hover:shadow-md transition-shadow text-left group">
                            <div class="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center mb-3 group-hover:bg-green-600 transition-colors">
                                <i class="fas fa-robot text-green-600 group-hover:text-white transition-colors"></i>
                            </div>
                            <h3 class="font-semibold mb-1">Iniciar Chat IA</h3>
                            <p class="text-gray-500 text-sm">Planifica clases con inteligencia artificial</p>
                        </button>

                        <button onclick="openNotasGrupo()"
                            class="bg-white p-5 rounded-lg shadow hover:shadow-md transition-shadow text-left group">
                            <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center mb-3 group-hover:bg-purple-600 transition-colors">
                                <i class="fas fa-table text-purple-600 group-hover:text-white transition-colors"></i>
                            </div>
                            <h3 class="font-semibold mb-1">Libro de Notas</h3>
                            <p class="text-gray-500 text-sm">Gestiona las calificaciones de tus estudiantes</p>
                        </button>
                    </div>
                </div>
                
                <!-- Grupos recientes -->
                <div>
                    <h2 class="text-xl font-bold text-gray-900 mb-4">Mis Grupos</h2>
                    
                    <div id="grupos-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Se llenan dinámicamente -->
                    </div>
                    
                    <!-- Mensaje si no hay grupos -->
                    <div id="no-grupos-message" class="hidden text-center py-12">
                        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-600 mb-4">Aún no has creado ningún grupo</p>
                        <button onclick="window.location.href='grupos.html?action=nuevo'" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
                            Crear Mi Primer Grupo
                        </button>
                    </div>
                </div>
                
            </main>
            
        </div>
    </div>
    
    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2 pointer-events-none"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/grupos.js"></script>

    <script>
        requireAuth();

        // ── Variables globales ──────────────────────────────────────
        let grupos = [];
        let user = null;
        let subscription = null;

        // ── Toast ───────────────────────────────────────────────────
        function toast(msg, type = 'success', duration = 3500) {
            const colors = {
                success: 'bg-green-600', error: 'bg-red-600',
                info: 'bg-blue-600', warning: 'bg-yellow-500'
            };
            const icons = {
                success: 'fa-check-circle', error: 'fa-exclamation-circle',
                info: 'fa-info-circle', warning: 'fa-exclamation-triangle'
            };
            const el = document.createElement('div');
            el.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium
                           ${colors[type]} transition-all duration-300 opacity-0 translate-y-2`;
            el.innerHTML = `<i class="fas ${icons[type]}"></i><span>${msg}</span>`;
            const container = document.getElementById('toast-container');
            container.appendChild(el);
            requestAnimationFrame(() => {
                el.classList.remove('opacity-0', 'translate-y-2');
            });
            setTimeout(() => {
                el.classList.add('opacity-0', 'translate-y-2');
                el.addEventListener('transitionend', () => el.remove());
            }, duration);
        }

        // ── Helpers ─────────────────────────────────────────────────
        const SUBJECT_ICONS = {
            'matemáticas': { icon: 'fa-calculator', color: 'text-blue-600', bg: 'bg-blue-100' },
            'matematicas':  { icon: 'fa-calculator', color: 'text-blue-600', bg: 'bg-blue-100' },
            'álgebra':      { icon: 'fa-square-root-alt', color: 'text-indigo-600', bg: 'bg-indigo-100' },
            'algebra':      { icon: 'fa-square-root-alt', color: 'text-indigo-600', bg: 'bg-indigo-100' },
            'física':       { icon: 'fa-atom', color: 'text-purple-600', bg: 'bg-purple-100' },
            'fisica':       { icon: 'fa-atom', color: 'text-purple-600', bg: 'bg-purple-100' },
            'química':      { icon: 'fa-flask', color: 'text-green-600', bg: 'bg-green-100' },
            'quimica':      { icon: 'fa-flask', color: 'text-green-600', bg: 'bg-green-100' },
            'biología':     { icon: 'fa-leaf', color: 'text-emerald-600', bg: 'bg-emerald-100' },
            'biologia':     { icon: 'fa-leaf', color: 'text-emerald-600', bg: 'bg-emerald-100' },
            'lengua':       { icon: 'fa-book-open', color: 'text-rose-600', bg: 'bg-rose-100' },
            'español':      { icon: 'fa-book-open', color: 'text-rose-600', bg: 'bg-rose-100' },
            'inglés':       { icon: 'fa-language', color: 'text-sky-600', bg: 'bg-sky-100' },
            'ingles':       { icon: 'fa-language', color: 'text-sky-600', bg: 'bg-sky-100' },
            'historia':     { icon: 'fa-landmark', color: 'text-amber-600', bg: 'bg-amber-100' },
            'ciencias':     { icon: 'fa-microscope', color: 'text-teal-600', bg: 'bg-teal-100' },
        };
        function subjectStyle(asignatura) {
            const key = (asignatura || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            return SUBJECT_ICONS[key] || { icon: 'fa-chalkboard-teacher', color: 'text-gray-600', bg: 'bg-gray-100' };
        }

        // ── Cargar datos en paralelo ─────────────────────────────────
        async function cargarDatos() {
            // Mostrar datos de localStorage instantáneamente
            const cached = Auth.getUser();
            if (cached) actualizarHeaderUsuario(cached);

            try {
                const [fetchedUser, fetchedGrupos, fetchedSub] = await Promise.all([
                    api.getMe(),
                    api.getGrupos(),
                    api.getSubscription().catch(() => null),
                ]);

                user = fetchedUser;
                Auth.setUser(user);
                grupos = fetchedGrupos;
                subscription = fetchedSub;

                actualizarHeaderUsuario(user);
                renderGrupos();
                renderSidebar();
                if (subscription) renderPlanUsage();
                actualizarEstadisticas();

            } catch (error) {
                console.error('Error cargando datos:', error);
                if (error.message?.includes('401') || error.message?.includes('Token')) {
                    window.location.href = 'login.html';
                } else {
                    toast('Error al cargar datos. Intenta recargar.', 'error');
                }
            }
        }

        function actualizarHeaderUsuario(u) {
            if (!u) return;
            document.getElementById('user-name').textContent = u.nombre_completo.split(' ')[0];
            document.getElementById('user-initial').textContent = u.nombre_completo.charAt(0).toUpperCase();
            const nameMenu = document.getElementById('user-name-menu');
            if (nameMenu) nameMenu.textContent = u.nombre_completo;
            const emailEl = document.getElementById('user-email');
            if (emailEl) emailEl.textContent = u.email;
        }

        // ── Renderizar grupos (grid principal) ───────────────────────
        function renderGrupos() {
            const gruposGrid = document.getElementById('grupos-grid');
            const noGruposMsg = document.getElementById('no-grupos-message');

            if (grupos.length === 0) {
                gruposGrid.classList.add('hidden');
                noGruposMsg.classList.remove('hidden');
                return;
            }

            gruposGrid.classList.remove('hidden');
            noGruposMsg.classList.add('hidden');

            gruposGrid.innerHTML = grupos.map(g => {
                const s = subjectStyle(g.asignatura);
                return `
                <div class="bg-white rounded-lg shadow hover:shadow-md transition-shadow flex flex-col">
                    <div class="p-5 flex-1">
                        <div class="flex items-center mb-3">
                            <div class="w-12 h-12 ${s.bg} rounded-xl flex items-center justify-center mr-3 flex-shrink-0">
                                <i class="fas ${s.icon} text-xl ${s.color}"></i>
                            </div>
                            <div class="min-w-0">
                                <h3 class="font-semibold text-gray-900 truncate">${g.nombre_grupo}</h3>
                                <p class="text-xs text-gray-500 mt-0.5">${g.grado} · ${g.asignatura}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 text-xs text-gray-500">
                            <span><i class="fas fa-users mr-1"></i>${g.cantidad_estudiantes} est.</span>
                            <span><i class="fas fa-calendar-alt mr-1"></i>${g.anio_lectivo}</span>
                            <span><i class="fas fa-flag mr-1"></i>Período ${g.periodo_actual}</span>
                        </div>
                    </div>
                    <div class="border-t flex">
                        <a href="chat.html?id=${g.id_grupo}"
                           class="flex-1 py-2.5 text-center text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-bl-lg transition-colors">
                            <i class="fas fa-robot mr-1"></i>Chat IA
                        </a>
                        <a href="grupos.html?tab=calificaciones&grupo=${g.id_grupo}"
                           class="flex-1 py-2.5 text-center text-sm font-medium text-green-600 hover:bg-green-50 rounded-br-lg border-l transition-colors">
                            <i class="fas fa-table mr-1"></i>Notas
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Renderizar sidebar ───────────────────────────────────────
        function renderSidebar() {
            const gruposList = document.getElementById('grupos-list');
            if (grupos.length === 0) {
                gruposList.innerHTML = `
                    <div class="text-center text-gray-400 py-6 text-sm">
                        <i class="fas fa-folder-open text-3xl mb-2 block"></i>
                        No tienes grupos aún
                    </div>`;
                return;
            }
            gruposList.innerHTML = grupos.map(g => {
                const s = subjectStyle(g.asignatura);
                return `
                <div class="group flex items-center p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <a href="chat.html?id=${g.id_grupo}" class="flex items-center flex-1 min-w-0">
                        <div class="w-8 h-8 ${s.bg} rounded-lg flex items-center justify-center mr-2 flex-shrink-0">
                            <i class="fas ${s.icon} text-sm ${s.color}"></i>
                        </div>
                        <div class="min-w-0">
                            <p class="font-medium text-sm text-gray-800 truncate">${g.nombre_grupo}</p>
                            <p class="text-xs text-gray-500">${g.grado} · ${g.cantidad_estudiantes} est.</p>
                        </div>
                    </a>
                    <a href="grupos.html?tab=calificaciones&grupo=${g.id_grupo}"
                       title="Libro de notas"
                       class="ml-1 text-gray-400 hover:text-green-600 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 p-1">
                        <i class="fas fa-table text-xs"></i>
                    </a>
                </div>`;
            }).join('');
        }

        // ── Plan usage ───────────────────────────────────────────────
        function renderPlanUsage() {
            if (!subscription) return;
            const mensajesUsados = subscription.mensajes_usados_mes || 0;
            const rawLimite = subscription.mensajes_limite_mes || 10;
            const esPro = subscription.plan === 'pro';
            const limiteDisplay = (esPro || rawLimite >= 999999) ? '∞' : rawLimite;
            const pct = (esPro || rawLimite >= 999999) ? 0 : Math.min((mensajesUsados / rawLimite) * 100, 100);

            const planLabel = document.getElementById('plan-label');
            const upgradeLink = document.getElementById('upgrade-link');
            const box = document.getElementById('plan-usage');

            if (esPro) {
                planLabel.textContent = '⭐ Plan Pro';
                planLabel.classList.replace('text-blue-900', 'text-purple-800');
                box.classList.replace('bg-blue-50', 'bg-purple-50');
                upgradeLink.classList.add('hidden');
            } else {
                planLabel.textContent = 'Plan Free';
                upgradeLink.classList.remove('hidden');
            }

            document.getElementById('messages-used').textContent = mensajesUsados;
            document.getElementById('messages-limit').textContent = limiteDisplay;
            document.getElementById('usage-bar').style.width = `${pct}%`;
            document.getElementById('mensajes-usados').textContent = mensajesUsados;
            document.getElementById('mensajes-limite').textContent = limiteDisplay;
        }

        // ── Estadísticas ─────────────────────────────────────────────
        function actualizarEstadisticas() {
            document.getElementById('total-grupos').textContent = grupos.length;
            const totalEst = grupos.reduce((s, g) => s + (g.cantidad_estudiantes || 0), 0);
            document.getElementById('total-estudiantes').textContent = totalEst;
        }

        // ── Abrir primer grupo (chat) ─────────────────────────────────
        function openFirstGroup() {
            if (grupos.length > 0) {
                window.location.href = `chat.html?id=${grupos[0].id_grupo}`;
            } else {
                toast('Primero crea un grupo para iniciar el chat', 'info');
            }
        }

        // ── Abrir libro de notas del primer grupo ────────────────────
        function openNotasGrupo() {
            if (grupos.length > 0) {
                window.location.href = `grupos.html?tab=calificaciones&grupo=${grupos[0].id_grupo}`;
            } else {
                toast('Primero crea un grupo para ver el libro de notas', 'info');
            }
        }

        // ── User menu ─────────────────────────────────────────────────
        document.getElementById('user-menu-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('user-menu').classList.toggle('hidden');
        });
        document.addEventListener('click', () => {
            document.getElementById('user-menu').classList.add('hidden');
        });

        // ── Logout ───────────────────────────────────────────────────
        function logout() {
            api.removeToken();
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ── Inicializar ──────────────────────────────────────────────
        cargarDatos();
    </script>
</body>
</html>
