<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Asistente Pedagógico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
    <style>
        /* Markdown rendering en burbujas IA */
        .msg-ia-body h1, .msg-ia-body h2, .msg-ia-body h3, .msg-ia-body h4 {
            font-weight: 700; margin: .75em 0 .35em; line-height: 1.25;
        }
        .msg-ia-body h1 { font-size: 1.15em; color: #1e40af; }
        .msg-ia-body h2 { font-size: 1.05em; color: #1d4ed8; }
        .msg-ia-body h3 { font-size: .95em;  color: #2563eb; }
        .msg-ia-body ul  { list-style: disc;    padding-left: 1.4em; margin: .4em 0; }
        .msg-ia-body ol  { list-style: decimal; padding-left: 1.4em; margin: .4em 0; }
        .msg-ia-body li  { margin: .2em 0; }
        .msg-ia-body p   { margin: .4em 0; }
        .msg-ia-body pre { background:#f1f5f9; border-radius:.4em; padding:.6em .8em;
                           overflow-x:auto; font-size:.82em; }
        .msg-ia-body code { background:#e2e8f0; border-radius:.25em; padding:.1em .3em;
                            font-size:.85em; font-family:'Courier New',monospace; }
        .msg-ia-body pre code { background: none; padding: 0; }
        .msg-ia-body hr  { border: none; border-top: 1px solid #e2e8f0; margin: .6em 0; }
        .msg-ia-body table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size:.9em; }
        .msg-ia-body th, .msg-ia-body td { border: 1px solid #e2e8f0; padding: .3em .6em; }
        .msg-ia-body th { background: #f1f5f9; font-weight: 600; }

        /* Botón descarga DOCX */
        .btn-docx {
            display: inline-flex; align-items: center; gap: .45em;
            padding: .4em .9em; border-radius: .55em; font-size: .82em;
            font-weight: 600; cursor: pointer; transition: all .2s;
            background: #eff6ff; color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .btn-docx:hover  { background: #dbeafe; border-color: #93c5fd; }
        .btn-docx:disabled { opacity: .6; cursor: not-allowed; }
        .btn-docx.done   { background: #f0fdf4; color: #15803d; border-color: #86efac; }

        /* Typing dots */
        .typing-dot { animation: bounce 1s infinite; display:inline-block; width:7px; height:7px;
                      background:#9ca3af; border-radius:50%; }
        .typing-dot:nth-child(2) { animation-delay:.15s; }
        .typing-dot:nth-child(3) { animation-delay:.3s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    </style>
</head>
<body class="bg-gray-50">

<div class="flex h-screen overflow-hidden">

    <!-- ── SIDEBAR ──────────────────────────────────────── -->
    <aside class="w-16 bg-white border-r flex flex-col items-center py-4 flex-shrink-0">
        <a href="dashboard.html" class="mb-6" title="Dashboard">
            <i class="fas fa-graduation-cap text-2xl text-blue-600"></i>
        </a>
        <nav class="flex flex-col items-center gap-4 flex-1">
            <a href="dashboard.html" title="Dashboard"
               class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-home"></i>
            </a>
            <a href="grupos.html" title="Grupos"
               class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-users"></i>
            </a>
            <a href="cuenta.html" title="Cuenta"
               class="w-10 h-10 flex items-center justify-center rounded-xl text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-colors">
                <i class="fas fa-user"></i>
            </a>
        </nav>
        <button onclick="cerrarSesion()" title="Cerrar Sesión"
            class="w-10 h-10 flex items-center justify-center rounded-xl text-red-400 hover:bg-red-50 hover:text-red-600 transition-colors">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </aside>

    <!-- ── MAIN ─────────────────────────────────────────── -->
    <div class="flex-1 flex flex-col min-w-0">

        <!-- Header -->
        <header class="bg-white border-b px-5 py-3 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="text-gray-400 hover:text-gray-700 transition-colors">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-lg font-bold text-gray-900 leading-tight" id="grupo-nombre">Cargando…</h1>
                    <p class="text-xs text-gray-500" id="grupo-info"></p>
                </div>
            </div>
            <button onclick="toggleSidebar()" title="Info del grupo"
                class="w-9 h-9 flex items-center justify-center rounded-xl text-gray-500 hover:bg-gray-100 transition-colors">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- Chat area -->
        <div class="flex-1 flex min-h-0">

            <!-- Mensajes -->
            <main class="flex-1 flex flex-col min-w-0">

                <!-- Burbuja de mensajes -->
                <div id="mensajes-container" class="flex-1 overflow-y-auto px-4 py-5 space-y-4">
                    <div id="chat-loading" class="text-center py-8 text-gray-400 text-sm">
                        <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>
                        Cargando historial…
                    </div>
                </div>

                <!-- Input -->
                <div class="border-t bg-white px-4 py-3 flex-shrink-0">
                    <!-- Error de límite de plan -->
                    <div id="plan-error" class="hidden mb-2 p-2.5 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-800 flex items-center gap-2">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="plan-error-msg"></span>
                        <a href="cuenta.html" onclick="sessionStorage.setItem('cuenta_tab','suscripcion')"
                           class="ml-auto text-blue-600 font-semibold hover:underline whitespace-nowrap">Ver planes →</a>
                    </div>

                    <!-- Selector de modo del asistente (Fase B) -->
                    <div id="mode-selector" class="flex items-center gap-1 mb-2 overflow-x-auto pb-1" role="tablist" aria-label="Modo del asistente">
                        <button type="button" data-modo="planeacion"
                            class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors whitespace-nowrap"
                            title="Planeación de clases con DUA">
                            <span>📚</span><span>Planeación</span>
                        </button>
                        <button type="button" data-modo="socioemocional"
                            class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors whitespace-nowrap"
                            title="Detección de señales socioemocionales — actúa como orientador escolar">
                            <span>💬</span><span>Socioemocional</span>
                        </button>
                        <button type="button" data-modo="calificacion"
                            class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors whitespace-nowrap"
                            title="Diseño de rúbricas alineadas al Decreto 1290">
                            <span>📊</span><span>Calificación</span>
                        </button>
                        <button type="button" data-modo="piar"
                            class="mode-btn flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors whitespace-nowrap"
                            title="Generación de PIAR — Decreto 1421/2017 (borrador)">
                            <span>📋</span><span>PIAR</span>
                        </button>
                        <span id="mode-hint" class="ml-2 text-[11px] text-gray-500 whitespace-nowrap"></span>
                    </div>

                    <!-- Panel PIAR (Fase C) — sólo visible cuando modo=piar -->
                    <div id="piar-panel" class="hidden mb-2 p-3 bg-orange-50 border border-orange-200 rounded-lg">
                        <div class="flex flex-wrap items-center gap-2">
                            <label class="text-xs font-semibold text-orange-900">Estudiante con PIAR:</label>
                            <select id="piar-estudiante-select"
                                class="text-xs px-2 py-1 border border-orange-300 rounded bg-white flex-1 min-w-[180px]"
                                onchange="onPiarEstudianteChange(this.value)">
                                <option value="">— Selecciona un estudiante —</option>
                            </select>
                            <button type="button" id="piar-generar-btn"
                                onclick="generarPiarBorrador()"
                                disabled
                                class="text-xs px-3 py-1 bg-orange-600 text-white rounded font-semibold hover:bg-orange-700 disabled:bg-gray-300 disabled:cursor-not-allowed whitespace-nowrap"
                                title="Sintetiza la conversación en un borrador de PIAR (DOCX)">
                                <i class="fas fa-file-word mr-1"></i>Generar PIAR
                            </button>
                        </div>
                        <div id="piar-banner" class="hidden mt-2 text-xs text-orange-900 font-medium flex items-center gap-2">
                            <i class="fas fa-info-circle"></i>
                            <span id="piar-banner-msg"></span>
                        </div>
                        <div id="piar-empty-hint" class="hidden mt-2 text-xs text-gray-600 italic">
                            Este grupo no tiene estudiantes con PIAR activo. Actívalo en la ficha de un estudiante para usar este modo.
                        </div>
                        <div id="piar-versiones" class="hidden mt-2 text-[11px] text-orange-900 flex flex-wrap gap-1.5"></div>
                    </div>

                    <!-- Rate limit banner (Fase B) -->
                    <div id="rate-limit-banner" class="hidden mb-2 p-2.5 bg-red-50 border border-red-200 rounded-lg text-sm text-red-800 flex items-center gap-2">
                        <i class="fas fa-clock"></i>
                        <span id="rate-limit-msg"></span>
                    </div>

                    <form id="chat-form" class="flex items-end gap-2">
                        <div class="flex-1">
                            <textarea
                                id="msg-input"
                                rows="2"
                                placeholder="Escribe tu mensaje… (Enter para enviar, Shift+Enter nueva línea)"
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm leading-relaxed"
                            ></textarea>
                        </div>
                        <div class="flex flex-col gap-1.5 pb-0.5">
                            <button type="button" onclick="document.getElementById('file-input').click()"
                                title="Adjuntar archivo"
                                class="w-10 h-10 flex items-center justify-center border border-gray-200 rounded-xl text-gray-500 hover:bg-gray-50 transition-colors">
                                <i class="fas fa-paperclip text-sm"></i>
                            </button>
                            <button type="submit" id="send-btn"
                                class="w-10 h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors">
                                <i class="fas fa-paper-plane text-sm"></i>
                            </button>
                        </div>
                        <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.docx,.jpg,.png">
                    </form>
                </div>
            </main>

            <!-- Panel derecho (info grupo) -->
            <aside id="info-sidebar" class="w-72 bg-white border-l overflow-y-auto hidden flex-shrink-0">
                <div class="p-5 space-y-6">

                    <!-- Estudiantes -->
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 flex items-center justify-between text-sm">
                            <span><i class="fas fa-users text-blue-500 mr-2"></i>Estudiantes</span>
                            <span id="est-count" class="bg-gray-100 text-gray-600 rounded-full px-2 py-0.5 text-xs font-medium">0</span>
                        </h3>
                        <div id="est-list" class="space-y-2 text-sm"></div>
                        <a href="#" id="est-link" class="mt-3 block text-xs text-blue-600 hover:underline">
                            Gestionar estudiantes →
                        </a>
                    </div>

                    <!-- Notas rápidas -->
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 text-sm">
                            <i class="fas fa-sticky-note text-yellow-500 mr-2"></i>Notas
                        </h3>
                        <div id="notas-list" class="space-y-2 mb-3"></div>
                        <button onclick="agregarNota()"
                            class="w-full text-xs bg-yellow-50 text-yellow-700 border border-yellow-200 py-2 rounded-lg hover:bg-yellow-100 transition-colors font-medium">
                            <i class="fas fa-plus mr-1"></i>Nueva nota
                        </button>
                    </div>

                    <!-- Documentos generados -->
                    <div>
                        <h3 class="font-semibold text-gray-800 mb-3 text-sm">
                            <i class="fas fa-file-word text-blue-500 mr-2"></i>Documentos DOCX
                        </h3>
                        <p class="text-xs text-gray-400">Los documentos se generan desde los mensajes de la IA con el botón <strong>Descargar DOCX</strong>.</p>
                    </div>

                </div>
            </aside>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
// GUARD + PARAMS
// ══════════════════════════════════════════════════════════════
requireAuth();

const urlParams = new URLSearchParams(window.location.search);
const grupoId   = urlParams.get('id');
if (!grupoId) { alert('Falta grupo'); window.location.href = 'dashboard.html'; }

// ── Estado global ─────────────────────────────────────────────
let socket  = null;
let grupo   = null;
let user    = null;

// Variables de streaming — separadas y claras
let _streamWrap  = null;   // el .flex externo del mensaje IA
let _streamBody  = null;   // el .msg-ia-body donde va el HTML renderizado
let _streamRaw   = '';     // markdown acumulado (fuente de verdad)

// Store de descargas: dlId → { md, titulo }
const _dlStore = {};
let   _dlCnt   = 0;

// ══════════════════════════════════════════════════════════════
// HISTORIAL POR MODO (Fase B · subtask 8)
// ══════════════════════════════════════════════════════════════

// Etiquetas legibles para el empty state por modo
const MODO_LABEL = {
    planeacion: 'planeación',
    socioemocional: 'socioemocional',
    calificacion: 'calificación',
    piar: 'PIAR',
};

function pintarHistorial(historial, modo) {
    const cont = document.getElementById('mensajes-container');
    if (!cont) return;
    // Limpiar sólo mensajes ya pintados (no toca el loader ni sidebars)
    cont.querySelectorAll('.msg-wrap').forEach(el => el.remove());
    // Empty state contextual si no hay historial en el modo activo
    const emptyExistente = cont.querySelector('#empty-modo');
    if (emptyExistente) emptyExistente.remove();
    if (!historial || historial.length === 0) {
        const div = document.createElement('div');
        div.id = 'empty-modo';
        div.className = 'text-center text-gray-400 text-sm py-8';
        const label = MODO_LABEL[modo] || 'este modo';
        div.innerHTML = `
            <i class="fas fa-comments text-3xl text-gray-300 mb-2"></i>
            <p>Aún no has hecho consultas de <strong>${label}</strong> en este grupo.</p>
            <p class="text-xs mt-1">Escribí tu primera consulta abajo — el asistente entra en modo ${label}.</p>
        `;
        cont.appendChild(div);
        return;
    }
    historial.forEach(m => addMsgDOM(m.remitente, m.contenido, m.timestamp));
}

async function recargarHistorialPorModo(modo, idEstudiante = null) {
    try {
        // Modo PIAR sin estudiante seleccionado → mostrar empty-state
        // sin fetchear (evita traer historial de OTRO PIAR del mismo grupo).
        if (modo === 'piar' && !idEstudiante) {
            pintarHistorial([], modo);
            return;
        }
        const historial = await api.getChatHistorial(grupoId, 50, modo, idEstudiante);
        pintarHistorial(historial, modo);
        scrollBottom();
    } catch (err) {
        console.error('[historial] recarga por modo falló:', err);
    }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init() {
    try {
        [user, grupo] = await Promise.all([api.getMe(), api.getGrupo(grupoId)]);
        renderGrupoHeader();

        // Sidebar + preload de estudiantes con PIAR (reusado por Fase C)
        const [estudiantes, notas] = await Promise.all([
            api.getEstudiantes(grupoId),
            api.getNotas(grupoId),
        ]);
        renderEstudiantes(estudiantes);
        renderNotas(notas);
        // Fase C: cache de estudiantes con tiene_piar=true del grupo actual.
        // No persiste entre grupos ni en localStorage — se recalcula acá.
        piarEstudiantesConPiar = (estudiantes || []).filter(e => e.tiene_piar);
        // Re-render del selector: puede que el chip PIAR necesite deshabilitarse
        // si no hay ningún estudiante con PIAR en este grupo.
        renderModoSelector();

        // Historial — filtrado por el modo activo (Fase B/C). En modo PIAR
        // sin estudiante seleccionado el empty-state se muestra directo.
        const modoInicial = getModoActivo();
        document.getElementById('chat-loading').remove();
        if (modoInicial === 'piar') {
            // Activa el panel PIAR y usa el empty-state hasta que el
            // docente elija estudiante — no hay estudiante persistido.
            togglePiarPanel(true);
            pintarHistorial([], modoInicial);
        } else {
            const historial = await api.getChatHistorial(grupoId, 50, modoInicial);
            pintarHistorial(historial, modoInicial);
            scrollBottom();
        }

        // WebSocket
        connectSocket();

    } catch (err) {
        console.error(err);
        alert('Error cargando el grupo. Vuelve al dashboard.');
        window.location.href = 'dashboard.html';
    }
}

// ══════════════════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════════════════
function renderGrupoHeader() {
    document.getElementById('grupo-nombre').textContent = grupo.nombre_grupo;
    document.getElementById('grupo-info').textContent =
        `${grupo.grado} · ${grupo.asignatura} · ${grupo.cantidad_estudiantes} estudiantes`;
    document.getElementById('est-link').href =
        `grupos.html?tab=estudiantes&grupo=${grupoId}`;
}

function renderEstudiantes(lista) {
    document.getElementById('est-count').textContent = lista.length;
    const el = document.getElementById('est-list');
    if (!lista.length) { el.innerHTML = '<p class="text-gray-400 text-xs">Sin estudiantes</p>'; return; }
    el.innerHTML = lista.slice(0, 6).map(e => `
        <div class="flex items-center gap-2 text-xs">
            <div class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                <i class="fas fa-user text-gray-400 text-xs"></i>
            </div>
            <div>
                <p class="font-medium text-gray-700">${e.codigo_estudiante}</p>
                ${e.tiene_piar ? '<p class="text-orange-500 text-xs">⚠ PIAR</p>' : ''}
            </div>
        </div>`).join('') +
        (lista.length > 6 ? `<p class="text-xs text-gray-400">+${lista.length - 6} más</p>` : '');
}

function renderNotas(lista) {
    const el = document.getElementById('notas-list');
    if (!lista.length) { el.innerHTML = '<p class="text-gray-400 text-xs">Sin notas</p>'; return; }
    el.innerHTML = lista.map(n => `
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2 text-xs text-gray-700">
            ${n.contenido}
        </div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// MENSAJES — agregar al DOM
// ══════════════════════════════════════════════════════════════
function addMsgDOM(remitente, contenido, timestamp) {
    const container = document.getElementById('mensajes-container');
    const isIA = remitente === 'sistema';
    const time = timestamp
        ? new Date(timestamp).toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' })
        : '';

    const wrap = document.createElement('div');
    // Clase 'msg-wrap' se usa para limpiar el contenedor al recargar el
    // historial filtrado por modo (Fase B · subtask 8).
    wrap.className = isIA
        ? 'msg-wrap flex justify-start gap-2'
        : 'msg-wrap flex justify-end';

    if (isIA) {
        // Avatar IA
        const av = document.createElement('div');
        av.className = 'w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center flex-shrink-0 mt-1';
        av.innerHTML = '<i class="fas fa-robot text-white text-xs"></i>';
        wrap.appendChild(av);

        const bubble = document.createElement('div');
        bubble.className = 'max-w-[75%] bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm';

        const body = document.createElement('div');
        body.className = 'msg-ia-body text-gray-800 text-sm leading-relaxed';
        body.innerHTML = marked.parse(contenido);
        bubble.appendChild(body);

        const meta = document.createElement('div');
        meta.className = 'flex items-center justify-between mt-2 gap-3';

        const ts = document.createElement('span');
        ts.className = 'text-xs text-gray-400';
        ts.textContent = time;
        meta.appendChild(ts);

        // Botón DOCX si aplica
        if (esDocumento(contenido)) {
            const btn = _crearBtnDocx(contenido);
            meta.appendChild(btn);
        }

        bubble.appendChild(meta);
        wrap.appendChild(bubble);

    } else {
        // Mensaje del docente
        const bubble = document.createElement('div');
        bubble.className = 'max-w-[70%] bg-blue-600 text-white rounded-2xl rounded-tr-none px-4 py-3';
        bubble.innerHTML = `
            <p class="text-sm leading-relaxed whitespace-pre-wrap">${escapeHtml(contenido)}</p>
            <p class="text-xs text-blue-200 mt-1">${time}</p>`;
        wrap.appendChild(bubble);
    }

    container.appendChild(wrap);
}

// ══════════════════════════════════════════════════════════════
// STREAMING
// ══════════════════════════════════════════════════════════════
function iniciarStreaming() {
    const container = document.getElementById('mensajes-container');

    // Avatar
    _streamWrap = document.createElement('div');
    _streamWrap.className = 'flex justify-start gap-2';

    const av = document.createElement('div');
    av.className = 'w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center flex-shrink-0 mt-1';
    av.innerHTML = '<i class="fas fa-robot text-white text-xs"></i>';
    _streamWrap.appendChild(av);

    const bubble = document.createElement('div');
    bubble.className = 'max-w-[75%] bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm';

    _streamBody = document.createElement('div');
    _streamBody.className = 'msg-ia-body text-gray-800 text-sm leading-relaxed';
    bubble.appendChild(_streamBody);
    _streamWrap.appendChild(bubble);
    container.appendChild(_streamWrap);
    _streamRaw = '';
}

function agregarChunk(chunk) {
    if (!_streamBody) iniciarStreaming();
    _streamRaw += chunk;
    _streamBody.innerHTML = marked.parse(_streamRaw);
    scrollBottom();
}

function finalizarStreaming(msgCompleto) {
    // Agregar botón de descarga si la respuesta es un documento
    if (_streamWrap && esDocumento(_streamRaw)) {
        const bubble = _streamWrap.querySelector('.bg-white');
        if (bubble) {
            const meta = document.createElement('div');
            meta.className = 'flex items-center justify-between mt-2 gap-3';
            const ts = document.createElement('span');
            ts.className = 'text-xs text-gray-400';
            ts.textContent = new Date().toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });
            meta.appendChild(ts);
            meta.appendChild(_crearBtnDocx(_streamRaw));
            bubble.appendChild(meta);
        }
    }

    // Resetear estado streaming
    _streamWrap = null;
    _streamBody = null;
    _streamRaw  = '';
    scrollBottom();
}

// ══════════════════════════════════════════════════════════════
// DETECCIÓN DE DOCUMENTO + BOTÓN DOCX
// ══════════════════════════════════════════════════════════════

/**
 * Determina si la respuesta IA parece un documento estructurado.
 * Criterio: al menos 1 encabezado markdown Y longitud > 400 chars.
 */
function esDocumento(md) {
    return md.length > 400 && /^#{1,4}\s.+/m.test(md);
}

/** Extrae el primer encabezado del markdown como título. */
function extraerTitulo(md) {
    const m = md.match(/^#{1,4}\s+(.+)/m);
    return m ? m[1].replace(/\*\*/g, '').trim() : 'Documento';
}

/** Crea el botón "Descargar DOCX" asociado a un contenido MD. */
function _crearBtnDocx(md) {
    const dlId = 'dl_' + (++_dlCnt);
    _dlStore[dlId] = { md, titulo: extraerTitulo(md) };

    const btn = document.createElement('button');
    btn.className = 'btn-docx';
    btn.dataset.dlId = dlId;
    btn.innerHTML = '<i class="fas fa-file-word"></i> Descargar DOCX';
    btn.onclick = () => descargarDocx(btn);
    return btn;
}

/** Llama al backend y descarga el archivo .docx. */
async function descargarDocx(btn) {
    const { md, titulo } = _dlStore[btn.dataset.dlId] || {};
    if (!md) return;

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando…';

    try {
        const resp = await fetch(
            `${window.APP_CONFIG.API_URL}/api/grupos/${grupoId}/generar-documento`,
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${api.getToken()}`,
                },
                body: JSON.stringify({ contenido_md: md, titulo }),
            }
        );

        if (!resp.ok) {
            const err = await resp.text();
            throw new Error(err || `HTTP ${resp.status}`);
        }

        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `${titulo.replace(/[^\w\s-]/g, '').trim()}.docx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        btn.innerHTML = '<i class="fas fa-check"></i> Descargado';
        btn.classList.add('done');
        btn.disabled = false;

    } catch (err) {
        console.error('Error descargando DOCX:', err);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-file-word"></i> Descargar DOCX';
        mostrarPlanError('Error al generar el documento. Intenta de nuevo.');
    }
}

// ══════════════════════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════════════════════
function connectSocket() {
    socket = io(window.APP_CONFIG.WS_URL, {
        auth: { token: api.getToken() }
    });

    socket.on('connect', () => {
        socket.emit('join_group', { grupo_id: grupoId });
    });

    socket.on('new_message', (data) => {
        // Solo renderizar mensajes del docente (los IA van por streaming)
        if (data.remitente === 'docente') {
            addMsgDOM('docente', data.contenido, data.timestamp);
            scrollBottom();
        }
    });

    socket.on('ia_generando', () => {
        mostrarTyping();
    });

    socket.on('ia_chunk', (chunk) => {
        ocultarTyping();
        if (!_streamBody) iniciarStreaming();
        agregarChunk(chunk);
    });

    socket.on('ia_complete', (data) => {
        ocultarTyping();
        finalizarStreaming(data);
        // Re-habilitar input
        enableInput();
    });

    socket.on('ia_error', (data) => {
        ocultarTyping();
        // Rate limit diario por modo → banner rojo específico
        if (data && data.code === 'rate_limit_diario') {
            mostrarRateLimit(data.message || 'Alcanzaste el límite diario.');
        }
        // Errores del flow PIAR (validación previa al rate limit) → alert
        // simple con mensaje claro. El backend ya validó, sólo mostrar.
        else if (data && data.code && data.code.startsWith('piar_')) {
            alert(data.message || 'Error de PIAR');
        }
        else if (_streamBody) {
            _streamBody.innerHTML = `<p class="text-red-500 text-sm">⚠ ${data.message}</p>`;
            _streamRaw = '';
        } else {
            mostrarPlanError(data.message);
        }
        _streamWrap = null; _streamBody = null; _streamRaw = '';
        enableInput();
    });

    socket.on('disconnect', () => {
        console.warn('Socket desconectado');
    });
}

// ── Typing indicator ──────────────────────────────────────────
let _typingEl = null;

            <i class="fas fa-robot text-white text-xs"></i>

        <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm">
            <div class="flex gap-1.5 items-center h-5">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
        </div>`;

}
function ocultarTyping() {
    if (_typingEl) { _typingEl.remove(); _typingEl = null; }
}

// ── Envío de mensaje ──────────────────────────────────────────
document.getElementById('chat-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('msg-input');
    const texto = input.value.trim();
    if (!texto) return;

    disableInput();
    ocultarPlanError();
    ocultarRateLimit();

    const modoEnvio = getModoActivo();
    const payload = {
        grupo_id: grupoId,
        mensaje: texto,
        modo: modoEnvio,
        archivos: [],
    };
    if (modoEnvio === 'piar' && piarEstudianteId) {
        payload.id_estudiante = piarEstudianteId;
    }
    socket.emit('send_message', payload);
    input.value = '';
    _streamWrap = null;
    _streamBody = null;
    _streamRaw  = '';
});

document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
});

function disableInput() {
    document.getElementById('msg-input').disabled = true;
    document.getElementById('send-btn').disabled  = true;
}
function enableInput() {
    const inp = document.getElementById('msg-input');
    inp.disabled = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
}

// ── Plan error banner ─────────────────────────────────────────
function mostrarPlanError(msg) {
    const el = document.getElementById('plan-error');
    document.getElementById('plan-error-msg').textContent = msg;
    el.classList.remove('hidden');
}
function ocultarPlanError() {
    document.getElementById('plan-error').classList.add('hidden');
}

// ── Rate limit banner (Fase B) ────────────────────────────────
function mostrarRateLimit(msg) {
    document.getElementById('rate-limit-msg').textContent = msg;
    document.getElementById('rate-limit-banner').classList.remove('hidden');
}
function ocultarRateLimit() {
    document.getElementById('rate-limit-banner').classList.add('hidden');
}

// ── Selector de modo (Fase B) ─────────────────────────────────
// Persistimos el modo activo por grupo en localStorage, así el docente
// no lo tiene que re-elegir cada vez que abre el chat del mismo grupo.
// EXCEPCIÓN documentada: cuando implementemos PIAR (siguiente sprint),
// el estudiante seleccionado dentro de ese modo NO se persistirá para
// evitar cruce de contexto entre grupos.
const MODOS = ['planeacion', 'socioemocional', 'calificacion', 'piar'];
const MODO_DEFAULT = 'planeacion';
const MODOS_HABILITADOS = ['planeacion', 'socioemocional', 'calificacion', 'piar'];

// Estado PIAR — NO persiste en localStorage (spec Fase C):
// el estudiante seleccionado muere al recargar o cambiar de grupo,
// para evitar cruce de contexto entre grupos.
let piarEstudianteId = null;
let piarEstudiantesConPiar = [];  // cache de estudiantes del grupo con tiene_piar=true

function modoStorageKey() {
    return `modo_chat_${grupoId}`;
}

function getModoActivo() {
    const guardado = localStorage.getItem(modoStorageKey());
    if (guardado && MODOS_HABILITADOS.includes(guardado)) return guardado;
    return MODO_DEFAULT;
}

function setModoActivo(modo) {
    if (!MODOS_HABILITADOS.includes(modo)) return;
    localStorage.setItem(modoStorageKey(), modo);
    renderModoSelector();
    ocultarRateLimit();

    // Panel PIAR: mostrar/ocultar según modo activo
    togglePiarPanel(modo === 'piar');

    // Al salir de PIAR el estudiante se resetea (no persiste); al volver
    // el docente debe re-seleccionarlo. Al cambiar de estudiante dentro
    // de PIAR también se recarga historial.
    if (modo !== 'piar') {
        piarEstudianteId = null;
    }

    // Recarga historial filtrado por modo (y estudiante si aplica)
    if (typeof recargarHistorialPorModo === 'function') {
        recargarHistorialPorModo(modo, modo === 'piar' ? piarEstudianteId : null);
    }
}

function renderModoSelector() {
    const activo = getModoActivo();
    const activeClass = 'bg-blue-600 text-white border-blue-600 shadow-sm';
    const inactiveClass = 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50';
    const disabledClass = 'opacity-40 cursor-not-allowed';

    document.querySelectorAll('#mode-selector .mode-btn').forEach(btn => {
        const modo = btn.dataset.modo;
        if (!MODOS_HABILITADOS.includes(modo)) return;

        // Gate específico para PIAR: requiere al menos un estudiante con tiene_piar=true
        const piarSinCandidatos = (modo === 'piar' && piarEstudiantesConPiar.length === 0);
        btn.disabled = piarSinCandidatos;
        if (piarSinCandidatos) {
            btn.title = 'No hay estudiantes con PIAR activo en este grupo. Marca al menos uno en la ficha del estudiante.';
        } else if (modo === 'piar') {
            btn.title = 'Generación de PIAR — Decreto 1421/2017 (borrador)';
        }

        btn.className = btn.className
            .replace(activeClass, '').replace(inactiveClass, '')
            .replace(disabledClass, '').trim();
        if (piarSinCandidatos) {
            btn.className += ' ' + inactiveClass + ' ' + disabledClass;
        } else {
            btn.className += ' ' + (modo === activo ? activeClass : inactiveClass);
        }
    });

    // Hint contextual por modo (placeholder del input + tooltip)
    const hints = {
        planeacion: 'Planifica clases con DUA',
        socioemocional: 'Describe la situación del estudiante o grupo',
        calificacion: 'Diseña rúbricas o valorá desempeño',
        piar: 'Conversación guiada para PIAR (Decreto 1421)',
    };
    const hintEl = document.getElementById('mode-hint');
    if (hintEl) hintEl.textContent = hints[activo] || '';
    const input = document.getElementById('msg-input');
    if (input) {
        input.placeholder = (hints[activo] || 'Escribe tu mensaje…') +
            ' (Enter para enviar, Shift+Enter nueva línea)';
    }
}

// ══════════════════════════════════════════════════════════════
// PANEL PIAR (Fase C)
// ══════════════════════════════════════════════════════════════

function togglePiarPanel(mostrar) {
    const panel = document.getElementById('piar-panel');
    if (!panel) return;
    if (mostrar) {
        panel.classList.remove('hidden');
        renderPiarPanel();
    } else {
        panel.classList.add('hidden');
        ocultarPiarBanner();
    }
}

function renderPiarPanel() {
    // Poblar el select con estudiantes que tienen tiene_piar=true
    const select = document.getElementById('piar-estudiante-select');
    const emptyHint = document.getElementById('piar-empty-hint');
    if (!select) return;

    if (piarEstudiantesConPiar.length === 0) {
        select.innerHTML = '<option value="">— Sin estudiantes con PIAR —</option>';
        select.disabled = true;
        if (emptyHint) emptyHint.classList.remove('hidden');
    } else {
        select.disabled = false;
        if (emptyHint) emptyHint.classList.add('hidden');
        const opts = ['<option value="">— Selecciona un estudiante —</option>']
            .concat(piarEstudiantesConPiar.map(e =>
                `<option value="${escapeHtml(e.id_estudiante)}"${e.id_estudiante === piarEstudianteId ? ' selected' : ''}>` +
                `${escapeHtml(e.codigo_estudiante)}${e.diagnostico ? ' — ' + escapeHtml(e.diagnostico.slice(0, 40)) : ''}` +
                `</option>`
            ));
        select.innerHTML = opts.join('');
        select.value = piarEstudianteId || '';
    }

    actualizarBotonGenerarPiar();
    actualizarPiarBanner();
    cargarVersionesPreviasSelected();
}

function onPiarEstudianteChange(nuevoId) {
    piarEstudianteId = nuevoId || null;
    actualizarBotonGenerarPiar();
    actualizarPiarBanner();
    cargarVersionesPreviasSelected();
    // Al cambiar de estudiante en PIAR, recargar historial filtrado por (piar, estudiante)
    recargarHistorialPorModo('piar', piarEstudianteId);
}

function actualizarBotonGenerarPiar() {
    const btn = document.getElementById('piar-generar-btn');
    if (!btn) return;
    btn.disabled = !piarEstudianteId;
}

function actualizarPiarBanner() {
    const banner = document.getElementById('piar-banner');
    const msg = document.getElementById('piar-banner-msg');
    if (!banner || !msg) return;
    if (!piarEstudianteId) {
        banner.classList.add('hidden');
        return;
    }
    const est = piarEstudiantesConPiar.find(e => e.id_estudiante === piarEstudianteId);
    if (!est) {
        banner.classList.add('hidden');
        return;
    }
    msg.textContent = `Generando PIAR para ${est.codigo_estudiante} — Borrador (Decreto 1421)`;
    banner.classList.remove('hidden');
}

function ocultarPiarBanner() {
    document.getElementById('piar-banner')?.classList.add('hidden');
    document.getElementById('piar-versiones')?.classList.add('hidden');
}

async function cargarVersionesPreviasSelected() {
    const cont = document.getElementById('piar-versiones');
    if (!cont) return;
    if (!piarEstudianteId) {
        cont.classList.add('hidden');
        cont.innerHTML = '';
        return;
    }
    try {
        const versiones = await api.listarPiarsEstudiante(piarEstudianteId);
        if (!versiones || versiones.length === 0) {
            cont.classList.add('hidden');
            cont.innerHTML = '';
            return;
        }
        cont.innerHTML = '<span class="font-semibold">Versiones previas:</span>' +
            versiones.slice(0, 5).map(v => {
                const estadoBg = v.estado === 'aprobado' ? 'bg-green-200 text-green-900' : 'bg-orange-200 text-orange-900';
                return `<a href="#" onclick="descargarPiar('${v.id_piar}');return false;"
                        title="Descargar DOCX de v${v.version} (${v.estado})"
                        class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded ${estadoBg} hover:opacity-80">
                        v${v.version} · P${v.periodo}/${v.anio} · ${v.estado}
                    </a>`;
            }).join(' ');
        cont.classList.remove('hidden');
    } catch (err) {
        console.warn('[PIAR] no pude cargar versiones previas:', err);
        cont.classList.add('hidden');
    }
}

async function generarPiarBorrador() {
    if (!piarEstudianteId) {
        alert('Selecciona un estudiante con PIAR primero.');
        return;
    }
    const btn = document.getElementById('piar-generar-btn');
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Sintetizando…';
    try {
        const periodo = grupo?.periodo_actual || 1;
        const piarCreado = await api.crearPiar(piarEstudianteId, periodo);
        // Auto-descargar el DOCX recién creado
        await api.descargarPiarDocx(piarCreado.id_piar);
        // Refrescar la lista de versiones previas
        await cargarVersionesPreviasSelected();
        alert(`Borrador PIAR v${piarCreado.version} generado. DOCX descargado.\n\nRecuerda: es borrador — podés generar más versiones antes de aprobar. Al aprobar queda inmutable.`);
    } catch (err) {
        // El body del error del backend viene en err.message como JSON string;
        // matcheamos por keywords del detail sin depender del status HTTP.
        const msg = String(err.message || err);
        const lower = msg.toLowerCase();
        if (lower.includes('conversac')) {
            alert('Aún no hay conversación de PIAR para este estudiante. Escribí al menos un mensaje en el chat antes de generar.');
        } else if (lower.includes('piar activo') || lower.includes('no tiene piar')) {
            alert('El estudiante no tiene PIAR activo. Actívalo en su ficha primero.');
        } else if (msg.includes('502') || lower.includes('claude')) {
            alert('El asistente IA no pudo generar el borrador (error del modelo). Volvé a intentar en un momento.');
        } else {
            // Intentar extraer 'detail' del JSON si el backend lo devolvió estructurado
            let msgLimpio = msg;
            try {
                const parsed = JSON.parse(msg);
                if (parsed && parsed.detail) msgLimpio = parsed.detail;
            } catch { /* no era JSON */ }
            alert('Error generando PIAR: ' + msgLimpio);
        }
    } finally {
        btn.innerHTML = orig;
        actualizarBotonGenerarPiar();
    }
}

async function descargarPiar(piarId) {
    try {
        await api.descargarPiarDocx(piarId);
    } catch (err) {
        alert('Error descargando DOCX: ' + (err.message || err));
    }
}

async function cargarEstudiantesConPiar() {
    try {
        const todos = await api.getEstudiantes(grupoId);
        piarEstudiantesConPiar = (todos || []).filter(e => e.tiene_piar);
    } catch (err) {
        console.warn('[PIAR] no pude cargar estudiantes del grupo:', err);
        piarEstudiantesConPiar = [];
    }
    // Re-render selector — puede que el chip PIAR necesite deshabilitarse
    renderModoSelector();
    // Si estamos en modo piar, refrescar el panel
    if (getModoActivo() === 'piar') {
        renderPiarPanel();
    }
}

// Wire up de los botones del selector
document.querySelectorAll('#mode-selector .mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (btn.disabled) return;
        const modo = btn.dataset.modo;
        setModoActivo(modo);
    });
});

// Render inicial una vez que grupoId esté disponible
renderModoSelector();

// ── Notas ──────────────────────────────────────────────────────
async function agregarNota() {
    const contenido = prompt('Escribe tu nota:');
    if (!contenido?.trim()) return;
    try {
        await api.createNota(grupoId, contenido.trim());
        const notas = await api.getNotas(grupoId);
        renderNotas(notas);
    } catch { alert('Error al agregar nota'); }
}

// ── Misc ───────────────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById('info-sidebar').classList.toggle('hidden');
}
function scrollBottom() {
    const c = document.getElementById('mensajes-container');
    c.scrollTop = c.scrollHeight;
}
function escapeHtml(str) {
    return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function cerrarSesion() {
    if (socket) socket.disconnect();
    api.removeToken();
    localStorage.clear();
    window.location.href = 'login.html';
}

init();
